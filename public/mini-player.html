<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Mini Player</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: #f4f7f8;
      user-select: none;
    }
    body { padding: 6px; }
    .mini-shell {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(9, 12, 15, 0.96);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      -webkit-app-region: drag;
    }
    .cover {
      position: relative;
      flex: 0 0 54px;
      width: 54px;
      height: 54px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: #151b20;
      box-shadow: inset 0 0 0 1px rgba(110, 231, 216, 0.04);
    }
    .cover img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    .cover.ready img { opacity: 1; }
    .cover-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #e5c98a;
      font-family: Georgia, serif;
      font-size: 20px;
      font-weight: 700;
    }
    .meta {
      min-width: 0;
      flex: 1 1 auto;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }
    .title, .artist {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0;
    }
    .title {
      color: #f7fafb;
      font-size: 12px;
      font-weight: 650;
      line-height: 1.25;
    }
    .artist {
      color: rgba(226, 234, 237, 0.54);
      font-size: 9.5px;
      line-height: 1.2;
    }
    .transport {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 28px 34px 28px;
      align-items: center;
      gap: 4px;
      -webkit-app-region: no-drag;
    }
    button {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: #151a1f;
      color: rgba(244, 248, 249, 0.78);
      cursor: pointer;
      outline: none;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
      -webkit-app-region: no-drag;
    }
    button:hover:not(:disabled) {
      border-color: rgba(110, 231, 216, 0.42);
      background: #1b2428;
      color: #ffffff;
    }
    button:active:not(:disabled) { transform: scale(0.94); }
    button:focus-visible { box-shadow: 0 0 0 2px rgba(110, 231, 216, 0.34); }
    button:disabled { opacity: 0.32; cursor: default; }
    button svg { width: 15px; height: 15px; pointer-events: none; }
    .play-toggle {
      width: 34px;
      height: 34px;
      border-color: rgba(110, 231, 216, 0.3);
      background: #172326;
      color: #a9fff2;
    }
    .play-toggle svg { width: 17px; height: 17px; }
    .pause-icon { display: none; }
    body[data-playing="true"] .play-icon { display: none; }
    body[data-playing="true"] .pause-icon { display: block; }
    .restore {
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      align-self: flex-start;
      margin: -1px -1px 0 0;
      border-color: transparent;
      background: transparent;
      color: rgba(225, 232, 235, 0.48);
    }
    .restore svg { width: 13px; height: 13px; }
    @media (prefers-reduced-motion: reduce) {
      .cover img, button { transition: none; }
    }
  </style>
</head>
<body data-playing="false">
  <main class="mini-shell" id="mini-shell" aria-label="Mineradio 迷你播放器">
    <div class="cover" id="cover-wrap" aria-hidden="true">
      <span class="cover-fallback">M</span>
      <img id="cover" alt="">
    </div>
    <div class="meta">
      <div class="title" id="title">Mineradio</div>
      <div class="artist" id="artist">等待播放</div>
    </div>
    <div class="transport">
      <button id="previous" type="button" title="上一首" aria-label="上一首">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="play" class="play-toggle" type="button" title="播放" aria-label="播放">
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
      </button>
      <button id="next" type="button" title="下一首" aria-label="下一首">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m6 18 8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
      </button>
    </div>
    <button id="restore" class="restore" type="button" title="返回主界面" aria-label="返回主界面">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg>
    </button>
  </main>
  <script>
    'use strict';
    var coverWrap = document.getElementById('cover-wrap');
    var cover = document.getElementById('cover');
    var title = document.getElementById('title');
    var artist = document.getElementById('artist');
    var playButton = document.getElementById('play');
    var controls = [document.getElementById('previous'), playButton, document.getElementById('next')];
    var lastCover = '';
    var miniState = { title:'Mineradio', artist:'', cover:'', playing:false, hasTrack:false };
    var renderedPlaying = null;
    var renderedHasTrack = null;

    function sendCommand(action) {
      if (!window.miniPlayer || typeof window.miniPlayer.command !== 'function') return;
      window.miniPlayer.command(action).catch(function(){});
    }

    function setCover(src) {
      src = String(src || '');
      if (src === lastCover) return;
      lastCover = src;
      coverWrap.classList.remove('ready');
      if (!src) {
        cover.removeAttribute('src');
        return;
      }
      cover.src = src;
    }

    function applyState(patch) {
      patch = patch || {};
      miniState = Object.assign({}, miniState, patch);
      var next = miniState;
      var hasTrack = next.hasTrack === true;
      var playing = hasTrack && next.playing === true;
      var nextTitle = hasTrack ? String(next.title || '未知歌曲') : 'Mineradio';
      var nextArtist = hasTrack ? String(next.artist || '本地音乐') : '等待播放';
      if (title.textContent !== nextTitle) title.textContent = nextTitle;
      if (artist.textContent !== nextArtist) artist.textContent = nextArtist;
      title.title = nextTitle;
      artist.title = nextArtist;
      if (renderedPlaying !== playing) {
        renderedPlaying = playing;
        document.body.setAttribute('data-playing', playing ? 'true' : 'false');
        playButton.title = playing ? '暂停' : '播放';
        playButton.setAttribute('aria-label', playButton.title);
      }
      if (renderedHasTrack !== hasTrack) {
        renderedHasTrack = hasTrack;
        for (var i = 0; i < controls.length; i++) controls[i].disabled = !hasTrack;
      }
      setCover(hasTrack ? next.cover : '');
    }

    cover.addEventListener('load', function(){
      if (cover.getAttribute('src')) coverWrap.classList.add('ready');
    });
    cover.addEventListener('error', function(){
      coverWrap.classList.remove('ready');
      // 失败地址需要释放缓存标记，后续播放状态同步才能重新触发加载。
      if (cover.getAttribute('src') === lastCover) {
        lastCover = '';
        cover.removeAttribute('src');
      }
    });
    document.getElementById('previous').addEventListener('click', function(){ sendCommand('previous'); });
    playButton.addEventListener('click', function(){ sendCommand('toggle-play'); });
    document.getElementById('next').addEventListener('click', function(){ sendCommand('next'); });
    document.getElementById('restore').addEventListener('click', function(){ sendCommand('restore'); });
    document.getElementById('mini-shell').addEventListener('dblclick', function(event){
      if (!event.target.closest('button')) sendCommand('restore');
    });
    if (window.miniPlayer && typeof window.miniPlayer.onState === 'function') window.miniPlayer.onState(applyState);
    applyState({});
  </script>
</body>
</html>
